# NOTEs: 
#       - Use single quotes when defining regex patterns to allow for escape characters like '\'
#       - You must add the correct amount of white spaces before a command inside a regex pattern check

policies:

  # Policies for required configurations that must be defined
  required:

    # Name of the policy
    global:
      # The IOS configuration scope of this policy. 
      # See README.md for available scopes
      scope: global

      # Rules defined in this policy
      rules:

        # The name of rule
        - aaa-model:
          # Severity level of rule
          severity: warning
          # Regex patterns that are searched for within this scope
          match:
            # All patterns must be included in the configuration
            all:
              - pattern: '^aaa new-model$'

          # Message displayed in the report
          message: >
            An AAA model must be defined

          # Example to comply with this rule
          example: |
            aaa new-model
            !
            !
            aaa group server radius management
             server-private <RADIUS IP> key <RADIUS KEY>
            !
            !
            aaa authentication login default group management
            aaa authentication enable default none
            aaa authorization exec default group management local if-authenticated
            !
            !
            aaa session-id common
        
        - password-encryption:
          severity: critical
          match:
            all:
              - pattern: '^service password-encryption$'
          message: >
            The password encryption service must be enabled
          example: |
            service password-encryption

        - unused_vlan:
          severity: warning
          match:
            all:
              - pattern: '^vlan 4000$'
          message: >
            A VLAN for unused interfaces must be defined
          example: |
            vlan 4000
             name UNUSED
             state suspend

    interfaces:
      # This scope will evaluate every interface in the configuration
      scope: interfaces

      rules:
        - client_access:
          severity: warning
          # Only evaluate this rule if the conditions are true
          conditions:
            # All patterns must match
            all:
              - not_pattern: '^ description .*\(no sticky\).*'
            # At least one pattern must match
            any:
              - pattern: '^ description .*[Cc]lient.*'
              - pattern: '^ description .*[Aa]ccess.*'
          match:
            all:
              - pattern: '^ spanning-tree portfast$'
              - pattern: '^ spanning-tree bpduguard enable$'
              - pattern: '^ switchport mode access$'
              - pattern: '^ switchport port-security$'
              - pattern: '^ switchport nonegotiate$'
              - pattern: '^ switchport port-security mac-address sticky$'

        - protected_port:
          conditions:
            all:
              - pattern: '^ description .*\(protected\).*'
          match:
            all:
              - pattern: '^ switchport protected$'
          severity: warning
          message: >
            Interfaces marked as protected must enable
            switchport protected
          example: |
            interface Gi0/1
             switchport protected

        - unused_port:
          severity: warning
          conditions:
            all:
              - pattern: '^ shutdown$'
                # Must NOT contain pattern
              - not_pattern: '^ switchport access vlan 4000$'
          match:
            all:
              - pattern: '^ description UNUSED$'
              - pattern: '^ switchport mode access$'
              - pattern: '^ switchport access vlan 4000$'
              - pattern: '^ shutdown$'
              

    vty:
      # This scope is used for VTY configuration
      scope: vty

      rules:
        - exec-timeout:
          severity: warning
          match:
            all:
              - pattern: '^ exec timout 9 59$'
          message: >
            VTYs should have a timout defined for 9 minutes and 59 seconds
          example: |
            line vty 0 15
              exec timout 9 59
        

  # Policies for forbidden configurations the must not be defined
  forbidden:
    web-server:
      scope: global

      rules:
        - no-http-server:
          severity: critical
          match:
            pattern: '^ip http server$'
          message: > 
            The HTTP server must be disabled
          example: |
            no ip http server
          
    vty:
      scope: vty

      rules:
        - no-telnet:
          severity: critical
          pattern: '^transport input telnet$'
          message: >
            Telnet must not be used. Use SSH instead
          example: | 
            line vty 0 15
             transport input ssh
          